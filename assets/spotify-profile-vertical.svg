<svg width="420" height="560" viewBox="0 0 420 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vertical Spotify profile banner</title>
  <desc id="desc">Cyberpunk vertical Spotify profile banner linked to the user's Spotify profile.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="18" x2="402" y2="542" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="0.55" stop-color="#0A0F1A"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="edge" x1="14" y1="14" x2="406" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1DB954"/>
      <stop offset="0.45" stop-color="#00E7FF"/>
      <stop offset="1" stop-color="#FF4DA6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(318 92) rotate(126.243) scale(170 170)">
      <stop stop-color="#1DB954" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1DB954" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .tiny { fill:#8CA3BA; font:700 11px 'Courier New', monospace; letter-spacing:1.8px; }
      .hud { fill:#98F5C0; font:800 15px 'Segoe UI', Tahoma, sans-serif; letter-spacing:2.5px; }
      .title { fill:#FFFFFF; font:900 27px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:0.6px; }
      .handle { fill:#DDF8E7; font:800 19px 'Segoe UI', Tahoma, sans-serif; }
      .body { fill:#DCE7F2; font:600 14px 'Segoe UI', Tahoma, sans-serif; }
      .chip { fill:#F5FAFF; font:700 12px 'Segoe UI', Tahoma, sans-serif; letter-spacing:1px; }
      .dash { stroke-dasharray:12 8; animation:dash 16s linear infinite; }
      .pulse { animation:pulse 3.2s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
      @keyframes pulse {
        0%, 100% { opacity:0.45; }
        50% { opacity:1; }
      }
    </style>
  </defs>

  <rect width="420" height="560" rx="30" fill="url(#bg)"/>
  <rect x="16" y="16" width="388" height="528" rx="24" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="30" y="30" width="360" height="500" rx="20" fill="none" stroke="#27364A"/>

  <g filter="url(#blur)">
    <ellipse cx="320" cy="96" rx="124" ry="108" fill="url(#glow)" class="pulse"/>
  </g>

  <text x="42" y="64" class="hud">SPOTIFY PROFILE</text>
  <text x="42" y="86" class="tiny">VERTICAL PROFILE BANNER / LIVE LINK</text>

  <g transform="translate(42 116)">
    <rect width="336" height="186" rx="28" fill="#0F1725" stroke="#2A3950"/>
    <rect x="18" y="18" width="300" height="150" rx="22" fill="#141E2F"/>
    <circle cx="84" cy="75" r="50" fill="#0D1117" stroke="#1DB954" stroke-opacity="0.65"/>
    <path d="M61 79C75 68 98 67 111 74" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M66 96C81 88 96 87 107 92" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
    <path d="M71 111C81 106 92 105 100 108" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.58"/>
    <circle cx="120" cy="36" r="7" fill="#FF4DA6" filter="url(#softGlow)"/>

    <text x="154" y="58" class="tiny">HANDLE</text>
    <text x="154" y="92" class="handle">elputoamoestabaenuso-4</text>
    <text x="154" y="122" class="body">open profile // follow the signal</text>
    <text x="154" y="146" class="body">hybrid readme panel wired to Spotify</text>
  </g>

  <g transform="translate(42 334)">
    <rect width="336" height="118" rx="22" fill="#0F1725" stroke="#2A3950"/>
    <text x="18" y="28" class="tiny">FREQUENCY</text>
    <rect x="18" y="44" width="16" height="54" rx="8" fill="#1B283A"/>
    <rect x="48" y="44" width="16" height="54" rx="8" fill="#1B283A"/>
    <rect x="78" y="44" width="16" height="54" rx="8" fill="#1B283A"/>
    <rect x="108" y="44" width="16" height="54" rx="8" fill="#1B283A"/>
    <rect x="138" y="44" width="16" height="54" rx="8" fill="#1B283A"/>
    <rect x="168" y="44" width="16" height="54" rx="8" fill="#1B283A"/>

    <rect x="18" y="66" width="16" height="32" rx="8" fill="#1DB954">
      <animate attributeName="y" values="66;42;66" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="height" values="32;56;32" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="52" width="16" height="46" rx="8" fill="#00E7FF">
      <animate attributeName="y" values="52;36;52" dur="1.15s" repeatCount="indefinite"/>
      <animate attributeName="height" values="46;62;46" dur="1.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="78" y="58" width="16" height="40" rx="8" fill="#FFE66D">
      <animate attributeName="y" values="58;40;58" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="height" values="40;58;40" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="108" y="48" width="16" height="50" rx="8" fill="#FF4DA6">
      <animate attributeName="y" values="48;30;48" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="height" values="50;68;50" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="138" y="60" width="16" height="38" rx="8" fill="#FFFFFF">
      <animate attributeName="y" values="60;44;60" dur="1.35s" repeatCount="indefinite"/>
      <animate attributeName="height" values="38;54;38" dur="1.35s" repeatCount="indefinite"/>
    </rect>
    <rect x="168" y="54" width="16" height="44" rx="8" fill="#1DB954">
      <animate attributeName="y" values="54;32;54" dur="1.25s" repeatCount="indefinite"/>
      <animate attributeName="height" values="44;66;44" dur="1.25s" repeatCount="indefinite"/>
    </rect>

    <g transform="translate(214 26)">
      <rect width="104" height="34" rx="17" fill="#101827" stroke="#2D3E53"/>
      <text x="52" y="22" class="chip" text-anchor="middle">OPEN PROFILE</text>
      <rect y="46" width="122" height="34" rx="17" fill="#101827" stroke="#2D3E53"/>
      <text x="61" y="68" class="chip" text-anchor="middle">FOLLOW SIGNAL</text>
    </g>
  </g>

  <rect x="40" y="492" width="340" height="10" fill="#1DB954" opacity="0.08" filter="url(#softGlow)">
    <animate attributeName="x" values="40;60;40" dur="4.8s" repeatCount="indefinite"/>
  </rect>
</svg>
