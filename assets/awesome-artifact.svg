<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">awesome-ai-devtools</title>
  <desc id="desc">Banner for the awesome-ai-devtools project.</desc>
  <defs>
    <linearGradient id="bg" x1="22" y1="20" x2="1258" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12192A"/>
      <stop offset="0.55" stop-color="#0A0F19"/>
      <stop offset="1" stop-color="#06090F"/>
    </linearGradient>
    <linearGradient id="edge" x1="24" y1="24" x2="1256" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCEE0C"/>
      <stop offset="0.45" stop-color="#03D8F3"/>
      <stop offset="1" stop-color="#FF0055"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#18304A" stroke-opacity="0.28"/>
    </pattern>
    <style>
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:2px; }
      .hud { fill:#FCEE0C; font:800 16px 'Segoe UI', Tahoma, sans-serif; letter-spacing:3px; }
      .title { fill:#FFFFFF; font:900 50px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:1px; }
      .body { fill:#E1EDF7; font:600 18px 'Segoe UI', Tahoma, sans-serif; }
      .metric { fill:#FFFFFF; font:900 28px 'Arial Black', 'Segoe UI', sans-serif; }
      .chip { fill:#F5FAFF; font:700 12px 'Segoe UI', Tahoma, sans-serif; letter-spacing:1px; }
      .dash { stroke-dasharray:16 11; animation:dash 16s linear infinite; }
      @keyframes dash { to { stroke-dashoffset:-320; } }
    </style>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="28" fill="url(#grid)"/>
  <rect x="18" y="18" width="1244" height="284" rx="22" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="34" y="34" width="1212" height="252" rx="18" fill="none" stroke="#27364A"/>
  <path d="M824 34H1086L1246 194V286H824V34Z" fill="#0D1421" fill-opacity="0.48"/>

  <text x="48" y="72" class="hud">FEATURED ARTIFACT</text>
  <text x="48" y="126" class="title">AWESOME-AI-DEVTOOLS</text>
  <text x="48" y="160" class="body">The open-source map of the AI developer tooling ecosystem.</text>
  <text x="48" y="188" class="body"></text>

  <g transform="translate(50 208)">
    <rect width="180" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="90" y="20" class="chip" text-anchor="middle">COMPARISON MATRIX</text>
    <rect x="190" width="90" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="235" y="20" class="chip" text-anchor="middle">LINKS</text>
    <rect x="290" width="140" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="360" y="20" class="chip" text-anchor="middle">16+ CATEGORIES</text>
    <rect x="440" width="120" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="500" y="20" class="chip" text-anchor="middle">OPEN SOURCE</text>
  </g>

  <g transform="translate(50 270)">
    <text class="tiny">PATH // yeaight7 / awesome-ai-devtools </text>
  </g>

  <g transform="translate(850 50)">
    <rect width="180" height="100" rx="8" fill="#0D1421" fill-opacity="0.6" stroke="#2D3E53" stroke-width="1.5"></rect>
    <text x="90" y="18" fill="#8CA3BA" font-weight="750" font-size="13px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">ENTRIES</text>
    <text x="90" y="58" fill="#FFFFFF" font-weight="900" font-size="32px" font-family="'Arial Black', 'Segoe UI', sans-serif" text-anchor="middle">262</text>
    <text x="90" y="88" fill="#8CA3BA" font-weight="700" font-size="11px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">reviewed entries</text>
  </g>

  <g transform="translate(1050 50)">
    <rect width="180" height="100" rx="8" fill="#0D1421" fill-opacity="0.6" stroke="#2D3E53" stroke-width="1.5"></rect>
    <text x="90" y="18" fill="#8CA3BA" font-weight="750" font-size="13px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">CATEGORIES</text>
    <text x="90" y="58" fill="#FFFFFF" font-weight="900" font-size="32px" font-family="'Arial Black', 'Segoe UI', sans-serif" text-anchor="middle">17</text>
    <text x="90" y="88" fill="#8CA3BA" font-weight="700" font-size="11px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">and counting</text>
  </g>

  <g transform="translate(850 165)">
    <rect width="180" height="100" rx="8" fill="#0D1421" fill-opacity="0.6" stroke="#2D3E53" stroke-width="1.5"></rect>
    <text x="90" y="18" fill="#8CA3BA" font-weight="750" font-size="13px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">REPOSITORY</text>
    <text x="90" y="58" fill="#FFFFFF" font-weight="900" font-size="32px" font-family="'Arial Black', 'Segoe UI', sans-serif" text-anchor="middle">ACTIVE</text>
    <text x="90" y="88" fill="#8CA3BA" font-weight="700" font-size="11px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">STATUS</text>
  </g>

  <g transform="translate(1050 165)">
    <rect width="180" height="100" rx="8" fill="#0D1421" fill-opacity="0.6" stroke="#2D3E53" stroke-width="1.5"></rect>
    <text x="90" y="18" fill="#8CA3BA" font-weight="750" font-size="13px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">STARS</text>
    <text x="90" y="58" fill="#FFFFFF" font-weight="900" font-size="32px" font-family="'Arial Black', 'Segoe UI', sans-serif" text-anchor="middle">3</text>
    <text x="90" y="88" fill="#8CA3BA" font-weight="700" font-size="11px" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="1px" text-anchor="middle">star if you find it useful</text>
  </g>

  <!-- <path d="M910 262H1164" stroke="#FF0055"/> -->
  <!-- <text x="945" y="232" class="tiny">TBD</text> -->
</svg>
