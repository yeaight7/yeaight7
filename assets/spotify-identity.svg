<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spotify identity banner</title>
  <desc id="desc">Cyberpunk Spotify profile identity card for the GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="706" y2="402" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="0.55" stop-color="#0A0F1A"/>
      <stop offset="1" stop-color="#06080D"/>
    </linearGradient>
    <linearGradient id="edge" x1="20" y1="18" x2="700" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1DB954"/>
      <stop offset="0.5" stop-color="#00E7FF"/>
      <stop offset="1" stop-color="#FF4DA6"/>
    </linearGradient>
    <linearGradient id="plate" x1="52" y1="120" x2="300" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172235"/>
      <stop offset="1" stop-color="#0F1725"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(572 88) rotate(139.748) scale(228 228)">
      <stop stop-color="#1DB954" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1DB954" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:2px; }
      .hud { fill:#98F5C0; font:800 16px 'Segoe UI', Tahoma, sans-serif; letter-spacing:3px; }
      .title { fill:#FFFFFF; font:900 34px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:1px; }
      .handle { fill:#DDF8E7; font:800 24px 'Segoe UI', Tahoma, sans-serif; letter-spacing:0.6px; }
      .body { fill:#DCE7F2; font:600 16px 'Segoe UI', Tahoma, sans-serif; }
      .chip { fill:#F5FAFF; font:700 14px 'Segoe UI', Tahoma, sans-serif; letter-spacing:1.2px; }
      .dash { stroke-dasharray:12 8; animation:dash 15s linear infinite; }
      .pulse { animation:pulse 3.4s ease-in-out infinite; }
      .float { animation:float 6.2s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
      @keyframes pulse {
        0%, 100% { opacity:0.45; }
        50% { opacity:1; }
      }
      @keyframes float {
        0%, 100% { transform:translateY(0); }
        50% { transform:translateY(-10px); }
      }
    </style>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="684" height="384" rx="22" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="34" y="34" width="652" height="352" rx="20" fill="none" stroke="#27364A"/>

  <g filter="url(#blur)">
    <ellipse cx="568" cy="92" rx="170" ry="124" fill="url(#glow)" class="pulse"/>
  </g>

  <text x="56" y="72" class="hud">SPOTIFY PROFILE</text>
  <text x="56" y="95" class="tiny">IDENTITY CARD / LINKED TO LIVE PROFILE</text>

  <g transform="translate(56 122)">
    <rect width="212" height="212" rx="30" fill="url(#plate)" stroke="#2B3C50"/>
    <circle cx="106" cy="106" r="72" fill="#0E1522" stroke="#1DB954" stroke-opacity="0.55"/>
    <circle cx="106" cy="106" r="48" fill="none" stroke="#00E7FF" stroke-opacity="0.35" class="float"/>
    <path d="M74 112C95 97 128 95 147 105" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M82 136C102 124 124 123 140 130" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M90 158C104 151 119 150 132 154" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.58"/>
    <circle cx="164" cy="48" r="9" fill="#FF4DA6" filter="url(#softGlow)"/>
  </g>

  <g transform="translate(304 136)">
    <text x="0" y="0" class="tiny">HANDLE</text>
    <text x="0" y="40" class="handle">elputoamoestabaenuso-4</text>
    <text x="0" y="84" class="title">follow the green signal</text>
    <text x="0" y="120" class="body">Cyberpunk profile card linked straight to the</text>
    <text x="0" y="146" class="body">Spotify page behind the current listening feed.</text>

    <g transform="translate(0 190)">
      <rect width="142" height="36" rx="18" fill="#101827" stroke="#2D3E53"/>
      <text x="71" y="23" class="chip" text-anchor="middle">OPEN PROFILE</text>
      <rect x="156" width="214" height="36" rx="18" fill="#101827" stroke="#2D3E53"/>
      <text x="263" y="23" class="chip" text-anchor="middle">FOLLOW THE SIGNAL</text>
    </g>
  </g>

  <rect x="52" y="358" width="616" height="10" fill="#1DB954" opacity="0.08" filter="url(#softGlow)">
    <animate attributeName="x" values="52;88;52" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
