<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TFG_CYBER_AI featured artifact</title>
  <desc id="desc">Stylized featured project card for the TFG_CYBER_AI repository.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="18" x2="1182" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="edge" x1="18" y1="18" x2="1182" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE66D"/>
      <stop offset="0.45" stop-color="#00E7FF"/>
      <stop offset="1" stop-color="#FF4DA6"/>
    </linearGradient>
    <style>
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:2px; }
      .hud { fill:#FFE66D; font:800 17px 'Segoe UI', Tahoma, sans-serif; letter-spacing:3px; }
      .title { fill:#FFFFFF; font:900 42px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:1px; }
      .body { fill:#DCE7F2; font:600 18px 'Segoe UI', Tahoma, sans-serif; }
      .chip { fill:#F5FAFF; font:700 13px 'Segoe UI', Tahoma, sans-serif; letter-spacing:1.2px; }
      .dash { stroke-dasharray:14 10; animation:dash 16s linear infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
    </style>
  </defs>

  <rect width="1200" height="260" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="224" rx="22" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="34" y="34" width="1132" height="192" rx="18" fill="none" stroke="#27364A"/>

  <text x="46" y="72" class="hud">FEATURED ARTIFACT</text>
  <text x="46" y="120" class="title">TFG_CYBER_AI</text>
  <text x="46" y="156" class="body">reinforcement-learning defender for malicious traffic detection and blocking</text>

  <g transform="translate(46 182)">
    <rect width="128" height="34" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="64" y="22" class="chip" text-anchor="middle">PYTHON</text>
    <rect x="142" width="128" height="34" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="206" y="22" class="chip" text-anchor="middle">QRDQN</text>
    <rect x="284" width="128" height="34" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="348" y="22" class="chip" text-anchor="middle">CICIDS2017</text>
  </g>

  <g transform="translate(872 70)">
    <rect width="220" height="120" rx="20" fill="#0E1524" stroke="#26374C"/>
    <text x="24" y="38" class="tiny">BEST RUN</text>
    <text x="24" y="72" fill="#FFFFFF" font-family="Arial Black, Segoe UI, sans-serif" font-size="32">0.9986</text>
    <text x="24" y="104" class="body">accuracy / 0.9995 recall</text>
  </g>
</svg>
