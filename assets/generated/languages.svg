<svg width="720" height="282" viewBox="0 0 720 282" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Language radar card</title>
  <desc id="desc">Self-hosted top languages card for the profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="700" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="edge" x1="22" y1="18" x2="698" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE66D"/>
      <stop offset="0.5" stop-color="#00E7FF"/>
      <stop offset="1" stop-color="#FF4DA6"/>
    </linearGradient>
    <style>
      .hud { fill:#FFFFFF; font:900 22px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:2px; }
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:1.5px; }
      .donut-label { fill:#94F4FF; font:900 16px 'Segoe UI', Tahoma, sans-serif; text-anchor:middle; }
      .donut-value { fill:#FFFFFF; font:900 28px 'Arial Black', 'Segoe UI', sans-serif; text-anchor:middle; }
      .lang-name { fill:#E6EDF3; font:700 13px 'Segoe UI', Tahoma, sans-serif; }
      .lang-value { fill:#8CA3BA; font:700 12px 'Courier New', monospace; text-anchor:end; }
      .dash { stroke-dasharray:12 8; animation:dash 18s linear infinite; }
      .pulse { animation:pulse 3s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
      @keyframes pulse {
        0%, 100% { opacity:0.2; }
        50% { opacity:0.85; }
      }
    </style>
  </defs>
  <rect width="720" height="282" rx="24" fill="url(#bg)"/>
  <rect x="18" y="18" width="684" height="246" rx="18" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="32" y="32" width="656" height="218" rx="16" fill="none" stroke="#27364A"/>
  <rect x="28" y="28" width="664" height="10" fill="#FFE66D" opacity="0.06" class="pulse"/>
  <text x="32" y="62" class="hud">LANGUAGE RADAR</text>
  <text x="32" y="82" class="tiny">BOOTSTRAP PLACEHOLDER / REAL VALUES ARRIVE AFTER ACTIONS SYNC</text>
  <circle cx="172" cy="150" r="74" stroke="#152133" stroke-width="26" fill="none"/>
  <path d="M 230.7081471815514 104.95165425335466 A 74 74 0 0 0 98.02535795180876 148.06290582521737" stroke="#00E7FF" stroke-width="26" stroke-linecap="round" fill="none"/><path d="M 196.70170758329905 219.7554703408212 A 74 74 0 0 0 232.98533795802916 108.08593846756237" stroke="#FF4DA6" stroke-width="26" stroke-linecap="round" fill="none"/><path d="M 113.29185281844859 195.0483457466453 A 74 74 0 0 0 193.01713550809026 220.9526603802463" stroke="#FFE66D" stroke-width="26" stroke-linecap="round" fill="none"/><path d="M 98.0233699930358 151.85962706280696 A 74 74 0 0 0 111.05858777549636 191.97790223538" stroke="#7CFFB2" stroke-width="26" stroke-linecap="round" fill="none"/>
  <text x="172" y="144" class="donut-label">TOP</text>
  <text x="172" y="176" class="donut-value">4</text>
  
  <g transform="translate(344 72)">
    <circle cx="8" cy="8" r="5" fill="#00E7FF"/>
    <text x="24" y="11" class="lang-name">SET GHRS_PAT</text>
    <rect x="0" y="18" width="282" height="10" rx="5" fill="#142033"/>
    <rect x="0" y="18" width="108" height="10" rx="5" fill="#00E7FF"/>
    <text x="292" y="27" class="lang-value">40.0%</text>
  </g>
  <g transform="translate(344 102)">
    <circle cx="8" cy="8" r="5" fill="#FF4DA6"/>
    <text x="24" y="11" class="lang-name">RUN WORKFLOW</text>
    <rect x="0" y="18" width="282" height="10" rx="5" fill="#142033"/>
    <rect x="0" y="18" width="81" height="10" rx="5" fill="#FF4DA6"/>
    <text x="292" y="27" class="lang-value">30.0%</text>
  </g>
  <g transform="translate(344 132)">
    <circle cx="8" cy="8" r="5" fill="#FFE66D"/>
    <text x="24" y="11" class="lang-name">SYNC CACHE</text>
    <rect x="0" y="18" width="282" height="10" rx="5" fill="#142033"/>
    <rect x="0" y="18" width="54" height="10" rx="5" fill="#FFE66D"/>
    <text x="292" y="27" class="lang-value">20.0%</text>
  </g>
  <g transform="translate(344 162)">
    <circle cx="8" cy="8" r="5" fill="#7CFFB2"/>
    <text x="24" y="11" class="lang-name">SHOW DONUT</text>
    <rect x="0" y="18" width="282" height="10" rx="5" fill="#142033"/>
    <rect x="0" y="18" width="27" height="10" rx="5" fill="#7CFFB2"/>
    <text x="292" y="27" class="lang-value">10.0%</text>
  </g>
</svg>