<svg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'
                style='isolation: isolate' viewBox='0 0 340 200' width='340px' height='200px' direction='ltr'>
        <style>
            @keyframes currstreak {
                0% { font-size: 3px; opacity: 0.2; }
                80% { font-size: 34px; opacity: 1; }
                100% { font-size: 28px; opacity: 1; }
            }
            @keyframes fadein {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
        </style>
        <defs>
            <clipPath id='outer_rectangle'>
                <rect width='340' height='200' rx='5'/>
            </clipPath>
            <mask id='mask_out_ring_behind_fire'>
                <rect width='340' height='200' fill='white'/>
                <ellipse id='mask-ellipse' cx='170' cy='32' rx='13' ry='18' fill='black'/>
            </mask>
            
        </defs>
        <g clip-path='url(#outer_rectangle)'>
            <g style='isolation: isolate'>
                <rect stroke='#141321' fill='#141321' rx='5' x='0.5' y='0.5' width='339' height='199'/>
            </g>
            <g style='isolation: isolate'>
                <line x1='113.33333333333' y1='29.25' x2='113.33333333333' y2='172.5' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#03d8f3' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3'/>
                <line x1='226.66666666667' y1='29.25' x2='226.66666666667' y2='172.5' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#03d8f3' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3'/>
            </g>
            <g style='isolation: isolate'>
                <!-- Total Contributions big number -->
                <g transform='translate(56.666666666667, 50.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#03d8f3' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='28px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 0.6s'>
                        496
                    </text>
                </g>

                <!-- Total Contributions label -->
                <g transform='translate(56.666666666667, 86.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#03d8f3' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='14px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 0.7s'>
                        <tspan x='0' dy='-9'>Total</tspan><tspan x='0' dy='16'>Contributions</tspan>
                    </text>
                </g>

                <!-- Total Contributions range -->
                <g transform='translate(56.666666666667, 116.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#8ca3ba' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='12px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 0.8s'>
                        <tspan x='0' dy='0'>Year To Date</tspan>
                    </text>
                </g>
            </g>
            <g style='isolation: isolate'>
                <!-- Current Streak label -->
                <g transform='translate(170, 110.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#ff0055' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='14px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 0.9s'>
                        Current Streak
                    </text>
                </g>

                <!-- Current Streak range -->
                <g transform='translate(170, 147.5)'>
                    <text x='0' y='21' stroke-width='0' text-anchor='middle' fill='#8ca3ba' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='12px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 0.9s'>
                        Apr 6 - Apr 22
                    </text>
                </g>

                <!-- Ring around number -->
                <g mask='url(#mask_out_ring_behind_fire)'>
                    <circle cx='170' cy='73.5' r='40' fill='none' stroke='#ff0055' stroke-width='5' style='opacity: 0; animation: fadein 0.5s linear forwards 0.4s'></circle>
                </g>
                <!-- Fire icon -->
                <g transform='translate(170, 22)' stroke-opacity='0' style='opacity: 0; animation: fadein 0.5s linear forwards 0.6s'>
                    <path d='M -12 -0.5 L 15 -0.5 L 15 23.5 L -12 23.5 L -12 -0.5 Z' fill='none'/>
                    <path d='M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z' fill='#fcee0c' stroke-opacity='0'/>
                </g>

                <!-- Current Streak big number -->
                <g transform='translate(170, 50.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#03d8f3' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='28px' font-style='normal' style='animation: currstreak 0.6s linear forwards'>
                        17
                    </text>
                </g>

            </g>
            <g style='isolation: isolate'>
                <!-- Longest Streak big number -->
                <g transform='translate(283.33333333333, 50.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#03d8f3' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='28px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 1.2s'>
                        17
                    </text>
                </g>

                <!-- Longest Streak label -->
                <g transform='translate(283.33333333333, 86.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#03d8f3' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='14px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 1.3s'>
                        Longest Streak
                    </text>
                </g>

                <!-- Longest Streak range -->
                <g transform='translate(283.33333333333, 116.5)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#8ca3ba' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='12px' font-style='normal' style='opacity: 0; animation: fadein 0.5s linear forwards 1.4s'>
                        Apr 6 - Apr 22
                    </text>
                </g>
            </g>
            
        </g>
    </svg>
