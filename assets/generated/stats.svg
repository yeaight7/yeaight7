<svg width="720" height="282" viewBox="0 0 720 282" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Neon telemetry card</title>
  <desc id="desc">Self-hosted GitHub telemetry card for the profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="16" x2="700" y2="266" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="edge" x1="22" y1="18" x2="698" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E7FF"/>
      <stop offset="0.5" stop-color="#FF4DA6"/>
      <stop offset="1" stop-color="#FFE66D"/>
    </linearGradient>
    <style>
      .hud { fill:#FFFFFF; font:900 22px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:2px; }
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:1.5px; }
      .value { fill:#FFFFFF; font:900 28px 'Arial Black', 'Segoe UI', sans-serif; }
      .subvalue { fill:#E6EDF3; font:800 24px 'Segoe UI', Tahoma, sans-serif; }
      .dash { stroke-dasharray:12 8; animation:dash 18s linear infinite; }
      .pulse { animation:pulse 3s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
      @keyframes pulse {
        0%, 100% { opacity:0.22; }
        50% { opacity:0.92; }
      }
    </style>
  </defs>
  <rect width="720" height="282" rx="24" fill="url(#bg)"/>
  <rect x="18" y="18" width="684" height="246" rx="18" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="32" y="32" width="656" height="218" rx="16" fill="none" stroke="#27364A"/>
  <rect x="28" y="28" width="664" height="10" fill="#00E7FF" opacity="0.07" class="pulse"/>
  <text x="32" y="62" class="hud">NEON TELEMETRY</text>
  <text x="32" y="82" class="tiny">BOOTSTRAP PLACEHOLDER / GHRS_PAT REQUIRED FOR PRIVATE TELEMETRY</text>
  
  <g transform="translate(32 96)">
    <rect width="150" height="86" rx="18" fill="#0E1524" stroke="#26374C"/>
    <rect x="18" y="18" width="34" height="6" rx="3" fill="#00E7FF" opacity="0.95"/>
    <text x="18" y="43" class="tiny">TOKEN</text>
    <text x="18" y="72" class="value">GHRS_PAT</text>
  </g>
  <g transform="translate(198 96)">
    <rect width="150" height="86" rx="18" fill="#0E1524" stroke="#26374C"/>
    <rect x="18" y="18" width="34" height="6" rx="3" fill="#7CFFB2" opacity="0.95"/>
    <text x="18" y="43" class="tiny">MODE</text>
    <text x="18" y="72" class="value">BOOT</text>
  </g>
  <g transform="translate(364 96)">
    <rect width="150" height="86" rx="18" fill="#0E1524" stroke="#26374C"/>
    <rect x="18" y="18" width="34" height="6" rx="3" fill="#FFE66D" opacity="0.95"/>
    <text x="18" y="43" class="tiny">SYNC</text>
    <text x="18" y="72" class="value">PENDING</text>
  </g>
  <g transform="translate(530 96)">
    <rect width="150" height="86" rx="18" fill="#0E1524" stroke="#26374C"/>
    <rect x="18" y="18" width="34" height="6" rx="3" fill="#FF4DA6" opacity="0.95"/>
    <text x="18" y="43" class="tiny">STATE</text>
    <text x="18" y="72" class="value">LOCAL</text>
  </g>
  <line x1="36" y1="202" x2="684" y2="202" stroke="#26374C"/>
  <text x="42" y="242" class="tiny">TOTAL CONTRIBUTIONS 12M</text>
  <text x="42" y="270" class="subvalue">--</text>
  
  <g transform="translate(42 218)">
    <text x="0" y="0" class="tiny" fill="#00E7FF">COMMITS 12M</text>
    <text x="0" y="28" class="subvalue">--</text>
  </g>
  <g transform="translate(204 218)">
    <text x="0" y="0" class="tiny" fill="#FF4DA6">PRS 12M</text>
    <text x="0" y="28" class="subvalue">--</text>
  </g>
  <g transform="translate(366 218)">
    <text x="0" y="0" class="tiny" fill="#7CFFB2">REVIEWS 12M</text>
    <text x="0" y="28" class="subvalue">--</text>
  </g>
  <g transform="translate(528 218)">
    <text x="0" y="0" class="tiny" fill="#FFE66D">ISSUES 12M</text>
    <text x="0" y="28" class="subvalue">--</text>
  </g>
</svg>