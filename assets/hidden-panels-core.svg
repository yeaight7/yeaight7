<svg width="1280" height="280" viewBox="0 0 1280 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hidden panels core</title>
  <desc id="desc">Animated console header for the hidden panels section of the GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="18" x2="1262" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="edge" x1="18" y1="18" x2="1262" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E7FF"/>
      <stop offset="0.5" stop-color="#FF4DA6"/>
      <stop offset="1" stop-color="#FFE66D"/>
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="2" fill="#17304D" fill-opacity="0.22"/>
    </pattern>
    <style>
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:2px; }
      .hud { fill:#94F4FF; font:800 17px 'Segoe UI', Tahoma, sans-serif; letter-spacing:3px; }
      .title { fill:#FFFFFF; font:900 36px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:1px; }
      .label { fill:#DCE7F2; font:700 16px 'Segoe UI', Tahoma, sans-serif; }
      .dash { stroke-dasharray:14 10; animation:dash 18s linear infinite; }
      @keyframes dash { to { stroke-dashoffset:-320; } }
    </style>
  </defs>

  <rect width="1280" height="280" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="1244" height="244" rx="22" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="34" y="34" width="1212" height="212" rx="18" fill="none" stroke="#27364A"/>
  <rect width="1280" height="280" rx="28" fill="url(#scan)" opacity="0.35"/>

  <text x="42" y="70" class="hud">HIDDEN PANELS CORE</text>
  <text x="42" y="98" class="title">TACTICAL FILES ONLINE</text>
  <text x="42" y="122" class="tiny">LOADOUT / LIVE SIGNAL / FEATURED ARTIFACT / ALL SYSTEMS HOT</text>

  <g transform="translate(42 154)">
    <rect width="350" height="68" rx="18" fill="#0E1524" stroke="#26374C"/>
    <text x="20" y="27" class="tiny">MODULE 01 // IDENTITY</text>
    <text x="20" y="50" class="label">loadout.cfg</text>
    <rect x="230" y="18" width="12" height="32" rx="6" fill="#00E7FF">
      <animate attributeName="height" values="32;18;32" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="250" y="14" width="12" height="36" rx="6" fill="#FF4DA6">
      <animate attributeName="height" values="36;24;36" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="270" y="20" width="12" height="30" rx="6" fill="#FFE66D">
      <animate attributeName="height" values="30;16;30" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(430 154)">
    <rect width="350" height="68" rx="18" fill="#0E1524" stroke="#26374C"/>
    <text x="20" y="27" class="tiny">MODULE 02 // LIVE LOG</text>
    <text x="20" y="50" class="label">signal.log</text>
    <line x1="226" y1="22" x2="318" y2="22" stroke="#2A3D55" stroke-width="6" stroke-linecap="round"/>
    <line x1="226" y1="38" x2="300" y2="38" stroke="#00E7FF" stroke-width="6" stroke-linecap="round">
      <animate attributeName="x2" values="300;334;300" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="226" y1="54" x2="286" y2="54" stroke="#FF4DA6" stroke-width="6" stroke-linecap="round">
      <animate attributeName="x2" values="286;322;286" dur="3.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(818 154)">
    <rect width="420" height="68" rx="18" fill="#0E1524" stroke="#26374C"/>
    <text x="20" y="27" class="tiny">MODULE 03 // ARTIFACT</text>
    <text x="20" y="50" class="label">artifact-slot</text>
    <rect x="262" y="18" width="126" height="32" rx="16" fill="#101827" stroke="#2D3E53"/>
    <text x="325" y="39" class="tiny" text-anchor="middle">TFG_CYBER_AI</text>
  </g>

  <rect x="36" y="30" width="1208" height="10" fill="#00E7FF" opacity="0.07">
    <animate attributeName="y" values="30;226;30" dur="7.5s" repeatCount="indefinite"/>
  </rect>
</svg>
