<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TFG_CYBER_AI featured artifact</title>
  <desc id="desc">Featured repository banner for the TFG_CYBER_AI project.</desc>
  <defs>
    <linearGradient id="bg" x1="22" y1="20" x2="1258" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12192A"/>
      <stop offset="0.55" stop-color="#0A0F19"/>
      <stop offset="1" stop-color="#06090F"/>
    </linearGradient>
    <linearGradient id="edge" x1="24" y1="24" x2="1256" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCEE0C"/>
      <stop offset="0.45" stop-color="#03D8F3"/>
      <stop offset="1" stop-color="#FF0055"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#18304A" stroke-opacity="0.28"/>
    </pattern>
    <style>
      .tiny { fill:#8CA3BA; font:700 12px 'Courier New', monospace; letter-spacing:2px; }
      .hud { fill:#FCEE0C; font:800 16px 'Segoe UI', Tahoma, sans-serif; letter-spacing:3px; }
      .title { fill:#FFFFFF; font:900 50px 'Arial Black', 'Segoe UI', sans-serif; letter-spacing:1px; }
      .body { fill:#E1EDF7; font:600 18px 'Segoe UI', Tahoma, sans-serif; }
      .metric { fill:#FFFFFF; font:900 28px 'Arial Black', 'Segoe UI', sans-serif; }
      .chip { fill:#F5FAFF; font:700 12px 'Segoe UI', Tahoma, sans-serif; letter-spacing:1px; }
      .dash { stroke-dasharray:16 11; animation:dash 16s linear infinite; }
      @keyframes dash { to { stroke-dashoffset:-320; } }
    </style>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="28" fill="url(#grid)"/>
  <rect x="18" y="18" width="1244" height="284" rx="22" fill="none" stroke="url(#edge)" stroke-width="2.5" class="dash"/>
  <rect x="34" y="34" width="1212" height="252" rx="18" fill="none" stroke="#27364A"/>
  <path d="M824 34H1086L1246 194V286H824V34Z" fill="#0D1421" fill-opacity="0.48"/>

  <text x="48" y="72" class="hud">FEATURED ARTIFACT // ACTIVE REPO</text>
  <text x="48" y="126" class="title">TFG_CYBER_AI</text>
  <text x="48" y="160" class="body">reinforcement-learning defender for malicious traffic detection and blocking</text>
  <text x="48" y="188" class="body">CICIDS2017 experiments, QRDQN training, validation checks, docs, and report pipeline</text>

  <g transform="translate(48 208)">
    <rect width="160" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="80" y="20" class="chip" text-anchor="middle">MACHINE LEARNING</text>
    <rect x="175" width="90" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="220" y="20" class="chip" text-anchor="middle">QRDQN</text>
    <rect x="280" width="156" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="358" y="20" class="chip" text-anchor="middle">LAB EMULATION</text>
    <rect x="450" width="150" height="32" rx="17" fill="#101827" stroke="#2D3E53"/>
    <text x="525" y="20" class="chip" text-anchor="middle">HEAVY TRAINING</text>
  </g>

  <g transform="translate(48 270)">
    <text class="tiny">PATH // yeaight7 / TFG_CYBER_AI / src + docs + experiments + report</text>
  </g>

  <g transform="translate(780 60)"> <!-- RESTAMOS 66 a la x para ajustar -->
    <rect width="440" height="184" rx="22" fill="#0F1724" stroke="#26374C"/> <!-- ahora ensanchamos el resto -->
    <text x="24" y="30" class="tiny">BEST RUN</text>

    <g transform="translate(24 48)">
      <rect width="120" height="102" rx="16" fill="#101827" stroke="#2D3E53"/> <!-- w+=22 -->
      <text x="60" y="28" class="tiny" text-anchor="middle">ACCURACY</text>
      <text x="60" y="68" class="metric" text-anchor="middle">0.9986</text>
      <text x="60" y="88" class="tiny" text-anchor="middle">C03 FULL</text>
    </g>

    <g transform="translate(160 48)"> <!-- x+=22 -->
      <rect width="120" height="102" rx="16" fill="#101827" stroke="#2D3E53"/> <!-- w+=22 -->
      <text x="60" y="68" class="metric" text-anchor="middle">0.9995</text>
      <text x="60" y="88" class="tiny" text-anchor="middle">ATTACK</text>
      <text x="60" y="28" class="tiny" text-anchor="middle">RECALL</text>
    </g>

    <g transform="translate(296 48)"> <!-- x+=44 -->
      <rect width="120" height="102" rx="16" fill="#101827" stroke="#2D3E53"/> <!-- w+=22 -->
      <text x="60" y="28" class="tiny" text-anchor="middle">F1</text> <!-- x+=11 -->
      <text x="60" y="68" class="metric" text-anchor="middle">0.9988</text>
      <text x="60" y="88" class="tiny" text-anchor="middle">CHECKED</text>
    </g>
  </g>

  <!-- <path d="M910 262H1164" stroke="#FF0055"/> -->
  <text x="945" y="232" class="tiny">VALIDATED RUN</text>
</svg>
